<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>致你 —— 生日快乐</title>
  <!-- 预加载核心字体和第一张图片，后续图片在需要时才加载 -->
  <link rel="preload" href="images/IMG_20260322_100848.png" as="image">
  <!-- 移除第二张和第三张的阻塞式预加载 -->
  <!-- <link rel="preload" href="images/IMG_20260322_100705.png" as="image"> -->
  <!-- <link rel="preload" href="images/IMG_20260322_100419.png" as="image"> -->

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;700&display=swap');

    :root {
      --bg-color: #050505;
      --text-color: #ffffff;
      --accent-color: #ffb7c5;
      /* 樱花粉点缀 */
    }

    /* --- 1. 全局与基础重置 --- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* --- 2. 极简开场界面 --- */
    #intro-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      z-index: 100;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: opacity 1s ease, visibility 1s ease;
    }

    .loading-text {
      color: #ffffff;
      /* 改回纯白 */
      font-size: 1.2rem;
      letter-spacing: 4px;
      font-weight: 300;
      animation: pulse 2s infinite;
      text-indent: 4px;
      /* 修正间距 */
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
      /* 纯白光晕 */
    }

    /* 点击开始的按钮 (不可见，覆盖全屏，保证任何位置都能点) */
    .start-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
      z-index: 101;
      display: none;
      /* 初始不可点击，加载完才显示 */
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 0.4;
      }

      50% {
        opacity: 1;
      }
    }

    /* --- 2. 电影感容器 (Cinematic Viewport) --- */
    #movie-container {
      position: relative;
      width: 100%;
      height: 100%;
      opacity: 0;
      pointer-events: none;
      transition: opacity 2s ease;
    }

    #movie-container.playing {
      opacity: 1;
      pointer-events: auto;
    }

    /* 电影黑边 (Cinematic Bars) */
    .cinematic-bar {
      position: absolute;
      left: 0;
      width: 100%;
      height: 10vh;
      background-color: #000;
      z-index: 40;
      /* 黑边的层级必须低于底部字幕 */
      transition: transform 2s ease-in-out;
    }

    /* 因为外层限制了 max-width，所以需要让 body 本身也是黑底，这样两边留白的地方就是纯黑 */
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background-color: #000;
      font-family: 'Noto Serif SC', 'Songti SC', 'Source Han Serif SC', serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #movie-container {
      position: relative;
      width: 100%;
      height: 100%;
      /* 限制最大宽高，避免图片被无限拉伸。一般 1080p 电脑图比例为 16:9，这里设置最大宽度 1920px */
      max-width: 1920px;
      /* 也可以限制最大比例为 16:9，防止出现过度细长的画面 */
      aspect-ratio: 16 / 9;
      background-color: #000;
      overflow: hidden;
      box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
      /* 边缘自然过渡到黑边 */
    }

    /* 当手机端（竖屏）时，改变最大比例限制为竖屏比例 */
    @media (max-width: 768px) {
      #movie-container {
        aspect-ratio: 9 / 16;
        max-height: 100vh;
      }
    }

    .cinematic-bar.top {
      top: 0;
      transform: translateY(-100%);
    }

    .cinematic-bar.bottom {
      bottom: 0;
      transform: translateY(100%);
    }

    #movie-container.playing .cinematic-bar {
      transform: translateY(0);
    }

    /* --- 3. 场景系统 (Scenes) --- */
    .scene {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      visibility: hidden;
      /* 重新设计转场：白色发光闪场 (Flash to White / Fade)
         将背景改为白色，使用 opacity 和 filter brightness 实现闪白和柔和淡入 */
      transition: opacity 2s ease-in-out, visibility 2s, filter 2s ease-out;
      filter: brightness(2) blur(5px);
      overflow: hidden;
      background-color: #fff;
      /* 使用纯白底色，配合 opacity 实现白屏闪场过渡 */
      z-index: 1;
    }

    .scene.active {
      opacity: 1;
      visibility: visible;
      filter: brightness(1) blur(0px);
      z-index: 5;
      /* 激活的场景置顶 */
    }

    /* 场景背景图：运用 Ken Burns 缓慢推拉效果营造视频感 */
    .scene-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      /* 使用 contain 保证图片完整显示，同时在拉伸浏览器时等比缩放 */
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      /* 全局滤镜高亮背景 */
      filter: brightness(1.2);
    }

    /* 将整个电影播放容器的最大宽度限制为图片宽度（例如常规的 1920px），并居中显示 */
    #movie-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      /* 限制最大宽高，避免图片被无限拉伸。一般 1080p 电脑图比例为 16:9，这里设置最大宽度 1920px */
      max-width: 1920px;
      background-color: #000;
      overflow: hidden;
      box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
      /* 边缘自然过渡到黑边 */
      margin: 0 auto;
      /* 在超宽屏下水平居中 */
    }

    /* 当手机端（竖屏）时，改变最大比例限制为竖屏比例 */
    @media (max-width: 768px) {
      #movie-container {
        /* 取消 aspect-ratio 强制锁定比例 */
        max-height: 100vh;
      }
    }

    /* 动画类：缓慢放大 */
    .ken-burns-in {
      animation: kenBurnsIn 12s linear forwards;
    }

    /* 动画类：缓慢平移缩放 */
    .ken-burns-pan {
      animation: kenBurnsPan 15s linear forwards;
    }

    @keyframes kenBurnsIn {
      0% {
        transform: scale(1);
      }

      100% {
        /* 因为使用了 contain，取消过度放大，只做极其微小的呼吸效果，确保边缘不被吃掉 */
        transform: scale(1.02);
      }
    }

    @keyframes kenBurnsPan {
      0% {
        transform: scale(1.02) translate(0, 0);
      }

      100% {
        transform: scale(1) translate(-0.5%, -0.5%);
      }
    }

    /* --- 4. 日漫风格文字排版 --- */
    .subtitle-container {
      position: absolute;
      z-index: 30;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 0;
      /* 移除左右内边距，确保绝对居中 */
    }

    /* 居中大字 (动漫开场标题风格) */
    .anime-title {
      font-size: 3rem;
      font-weight: 300;
      /* 恢复为优雅的细体 */
      letter-spacing: 15px;
      text-align: center;
      opacity: 0;
      transform: scale(0.95);
      transition: all 3s cubic-bezier(0.215, 0.610, 0.355, 1);
      /* 修复因为 letter-spacing 导致的视觉右偏：
         letter-spacing 会在最后一个字符后也加上间距，导致整体偏左。
         通过向左缩进相同的距离来抵消这个偏差，实现绝对的视觉居中。 */
      text-indent: 15px;
      /* 将文字颜色改为略带透明度的纯白，为下方的发光留出空间 */
      color: rgba(255, 255, 255, 0.95);
      /* 引入高级多重霓虹发光效果，不再是死板的阴影，而是光晕扩散 */
      text-shadow:
        0 0 10px rgba(255, 255, 255, 0.8),
        0 0 20px rgba(255, 255, 255, 0.6),
        0 0 40px rgba(255, 183, 197, 0.4),
        /* 融入一丝极微弱的粉/香槟色光晕，增加层次 */
        0 4px 15px rgba(0, 0, 0, 0.9);
      /* 底层黑色阴影保证文字在亮背景下不丢失边界 */
    }

    /* 竖排文字 (传统日系感) */
    .vertical-text {
      writing-mode: vertical-rl;
      font-size: 1.8rem;
      font-weight: 400;
      /* 恢复正常粗细 */
      letter-spacing: 8px;
      line-height: 2;
      height: 60vh;
      opacity: 0;
      transform: translateY(20px);
      transition: all 2.5s ease;
      /* 修复竖排文字在手机端左侧溢出的问题：
         增加向右的负边距或者 padding，防止左侧最末尾的一行字超出屏幕 */
      padding-left: 20px;
      /* 使用纯白但带点透明，让背景能稍微透过来 */
      color: rgba(255, 255, 255, 0.9);
      /* 柔和且具有弥散感的光晕，替代死板的单层阴影 */
      text-shadow:
        0 0 10px rgba(255, 255, 255, 0.5),
        0 0 20px rgba(255, 255, 255, 0.3),
        0 2px 10px rgba(0, 0, 0, 0.9);
    }

    /* 响应式设计：针对手机屏幕缩小字号，防止竖排文字过长超出屏幕边界 */
    @media (max-width: 768px) {
      .vertical-text {
        font-size: 1.2rem;
        /* 缩小字号 */
        letter-spacing: 4px;
        /* 缩小字间距 */
        line-height: 1.8;
      }
    }

    /* 底部台词字幕 (经典动漫字幕位置) */
    .anime-subtitle {
      position: absolute;
      bottom: 15vh;
      /* 微微下移，从 20vh 调到 15vh，寻找平衡点 */
      width: 100%;
      text-align: center;
      font-size: 1.2rem;
      letter-spacing: 5px;
      text-indent: 4px;
      opacity: 0;
      transform: translateY(10px);
      transition: all 2s ease;
      z-index: 50;
      /* 必须比黑边 (z-index: 40) 更高，否则会被黑边遮挡 */
      color: #ffffff;
      text-shadow:
        0 0 8px rgba(255, 255, 255, 0.8),
        0 0 15px rgba(255, 255, 255, 0.4),
        0 2px 5px rgba(0, 0, 0, 1),
        0 4px 15px rgba(0, 0, 0, 0.8);
      /* 增加内边距，防止在极窄屏幕上文字贴边 */
      padding: 0 10px;
      box-sizing: border-box;
    }

    /* 针对手机屏幕进一步缩小底部字幕，防止太长导致换行或被截断 */
    @media (max-width: 768px) {
      .anime-subtitle {
        font-size: 0.9rem;
        letter-spacing: 3px;
        bottom: 18vh;
        /* 手机端也同步微调下移 */
      }
    }

    /* 激活状态下的文字动画 */
    .scene.active .anime-title {
      opacity: 1;
      transform: scale(1);
    }

    .scene.active .vertical-text {
      opacity: 1;
      transform: translateY(0);
    }

    .scene.active .anime-subtitle {
      opacity: 1;
    }

    /* 文字出现的延迟控制 */
    .delay-1 {
      transition-delay: 1s;
    }

    .delay-2 {
      transition-delay: 2.5s;
    }

    .delay-3 {
      transition-delay: 4s;
    }

    /* --- 5. 播放进度条 UI --- */
    #player-ui {
      position: absolute;
      bottom: 20px;
      left: 0;
      width: 100%;
      padding: 0 40px;
      z-index: 60;
      display: flex;
      align-items: center;
      gap: 15px;
      opacity: 0;
      transition: opacity 1s ease;
    }

    #movie-container.playing #player-ui {
      opacity: 1;
      transition-delay: 2s;
      /* 等黑边出来后再显示 */
    }

    .time-text {
      font-family: monospace;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
    }

    .progress-bar-container {
      flex-grow: 1;
      height: 2px;
      background: rgba(255, 255, 255, 0.2);
      position: relative;
    }

    .progress-bar-fill {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      background: var(--text-color);
      width: 0%;
      /* 将通过 JS 控制宽度模拟播放进度 */
    }

    /* --- 6. 樱花/光斑 Canvas --- */
    #particle-canvas,
    #fireworks-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #particle-canvas {
      z-index: 20;
      /* 在背景图之上，文字之下 */
      opacity: 0.6;
    }

    #fireworks-canvas {
      z-index: 60;
      /* 烟花在最顶层，覆盖所有元素 */
    }

    /* --- 7. 动漫视频质感滤镜 (Film Grain & Scanlines) - 已移除扫描线，避免眼睛疲劳 --- */
    .video-filter {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 35;
      /* 低于字幕和黑边 */
      pointer-events: none;
      opacity: 0;
      transition: opacity 2s ease;
      /* 仅保留轻微的四周暗角，让视线更聚焦中心，移除线性的扫描线 */
      background: radial-gradient(circle, transparent 60%, rgba(0, 0, 0, 0.3) 100%);
    }

    #movie-container.playing .video-filter {
      opacity: 1;
    }

    /* --- 场景 3：交互式礼物盒 --- */
    .interactive-gift {
      position: relative;
      width: 120px;
      /* 调整为适合图片的尺寸 */
      height: 120px;
      margin-bottom: 40px;
      cursor: pointer;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .scene.active .interactive-gift.delay-2 {
      opacity: 1;
      transform: translateY(0);
      animation: floatGift 3s ease-in-out infinite 2s;
    }

    /* 礼物盒图片样式 */
    .gift-img-closed {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.5));
      transition: all 0.5s ease;
    }

    /* 确保 SVG 能够正确缩放 */
    .gift-img-closed svg {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* 悬停时的光晕提示 */
    .interactive-gift:hover .gift-img-closed {
      transform: scale(1.1);
      filter: drop-shadow(0 0 30px rgba(255, 183, 197, 0.8));
    }

    /* 拆开提示文字 */
    .gift-hint {
      position: absolute;
      bottom: -40px;
      /* 把文字往下挪一点，给蛋糕留出空间 */
      color: white;
      font-size: 0.9rem;
      letter-spacing: 2px;
      font-weight: bold;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
      animation: blinkText 2s infinite;
      white-space: nowrap;
    }

    /* 弹出的贺卡 */
    .gift-card {
      position: absolute;
      /* 初始状态：隐藏在底部更深的位置，让它看起来是从下方弹出来的 */
      bottom: -60px;
      left: 50%;
      transform: translateX(-50%) translateY(50px) scale(0.5);
      width: 300px;
      max-width: 90vw;
      /* 防止在极窄屏幕上超出宽度 */
      min-height: 200px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 30px 20px;
      box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.4), 0 0 0 2px rgba(255, 183, 197, 0.5);
      opacity: 0;
      visibility: hidden;
      transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 1;
      text-align: center;
      color: #333;
    }

    .card-content h3 {
      color: #ff708a;
      font-size: 1.5rem;
      margin-bottom: 15px;
      letter-spacing: 5px;
    }

    .card-content p {
      font-size: 1rem;
      line-height: 1.8;
      color: #666;
      margin-bottom: 20px;
    }

    .card-close {
      display: inline-block;
      padding: 8px 20px;
      background: #ffb7c5;
      color: white;
      border-radius: 20px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.3s;
    }

    .card-close:hover {
      background: #ff8a9f;
    }

    /* 交互打开状态 */
    .interactive-gift.open {
      animation: none;
      /* 停止浮动 */
      cursor: default;
    }

    .interactive-gift.open .gift-img-closed {
      opacity: 0;
      transform: scale(0.5);
    }

    .interactive-gift.open .gift-hint {
      opacity: 0;
    }

    .interactive-gift.open .gift-card {
      opacity: 1;
      visibility: visible;
      /* 修改打开时的位置：增加 translateY(30px) 让贺卡整体往下沉一点 */
      transform: translateX(-50%) translateY(30px) scale(1);
      z-index: 4;
    }

    /* 重播按钮 */
    #replay-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 100;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.9rem;
      cursor: pointer;
      display: none;
      /* 初始隐藏，播放结束后显示 */
      transition: all 0.3s ease;
      letter-spacing: 2px;
    }

    #replay-btn:hover {
      background: rgba(255, 255, 255, 0.4);
      transform: scale(1.05);
    }

    /* 打开礼物时隐藏大标题 */
    .hide-title {
      opacity: 0 !important;
      transform: translateY(20px) !important;
      transition: all 0.5s ease !important;
    }

    @keyframes floatGift {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    @keyframes blinkText {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    @keyframes pulseHover {
      0% {
        transform: translate(-50%, -50%) scale(0.9);
        opacity: 0.5;
      }

      100% {
        transform: translate(-50%, -50%) scale(1.1);
        opacity: 1;
      }
    }
  </style>
</head>

<body>

  <!-- 极简开场界面 -->
  <div id="intro-screen">
    <div class="loading-text" id="loading-msg">正在准备奇迹...</div>
    <div class="start-overlay" id="start-btn"></div>
  </div>

  <!-- 电影播放容器 -->
  <div id="movie-container">
    <button id="replay-btn" onclick="replayMovie()">重新播放</button>

    <!-- 电影黑边 -->
    <div class="cinematic-bar top"></div>
    <div class="cinematic-bar bottom"></div>

    <!-- 视频滤镜 -->
    <div class="video-filter"></div>

    <!-- 粒子系统 -->
    <canvas id="particle-canvas"></canvas>

    <!-- 烟花系统 (置于顶层) -->
    <canvas id="fireworks-canvas"></canvas>

    <!-- 场景 1：寂静的开场 -->
    <div class="scene" id="scene-1">
      <!-- 
        【修改背景图片 1】
      -->
      <div class="scene-bg ken-burns-in" id="bg-1"
        style="background-color: #000; filter: brightness(0.9) saturate(1.2);"></div>
      <div class="subtitle-container">
        <div class="anime-title delay-1">光阴的信笺<br><span
            style="font-size: 1.2rem; display: block; margin-top: 15px; color: var(--accent-color); letter-spacing: 8px;">A
            Letter from Time</span></div>
      </div>
    </div>

    <!-- 场景 2：回忆与诗意 -->
    <div class="scene" id="scene-2">
      <!-- 
        【修改背景图片 2】
      -->
      <div class="scene-bg ken-burns-pan" id="bg-2"
        style="background-color: #000; filter: brightness(0.9) saturate(1.3);"></div>
      <div class="subtitle-container"
        style="align-items: flex-end; padding-right: 10vw; padding-left: 5vw; box-sizing: border-box;">
        <div class="vertical-text delay-1">
          「地球又绕着太阳转了一圈，<br>
          <span style="margin-top: 2em; display: inline-block;">那些微小的欢喜与感动，</span><br>

  <script>
    // --- 导演系统：控制场景切换与播放进度 ---
    const startBtn = document.getElementById('start-btn');
    const introScreen = document.getElementById('intro-screen');
    const loadingMsg = document.getElementById('loading-msg');
    const movieContainer = document.getElementById('movie-container');

    // 预加载提示语
    loadingMsg.innerText = '正在加载奇迹...';
    startBtn.style.pointerEvents = 'none'; // 加载完成前禁止点击
    startBtn.style.opacity = '0.5';

    // 检测是否为移动端设备 (简单以屏幕宽度作为判断标准)
    let isMobile = window.innerWidth <= 768;

    // --- 极简图片配置区 ---
    // 这里是你电脑端（横屏）使用的图片
    const pcImages = [
      'images/hp1.png', // 场景 1
      'images/hp2.png', // 场景 2
      'images/hp3.png'  // 场景 3
    ];

    // 这里是你手机端（竖屏）使用的图片
    const mobileImages = [
      'images/sp1.png', // 场景 1
      'images/sp2.png', // 场景 2
      'images/sp3.png'  // 场景 3
    ];
    // ----------------------

    // 最终决定的图片列表
    let finalImages = isMobile ? mobileImages : pcImages;

    // 图片预加载逻辑
    let loadedImages = 0;

    // 允许播放的函数（只有当前设备对应的 3 张图片加载完才会调用）
    function enablePlay() {
      loadingMsg.innerText = '点击屏幕开启';
      startBtn.style.pointerEvents = 'auto';
      startBtn.style.opacity = '1';
      startBtn.style.display = 'block';
    }

    // 强制加载当前设备所需的所有图片
    finalImages.forEach((src, index) => {
      const img = new Image();
      img.onload = img.onerror = () => {
        const bgId = index === 0 ? 'bg-1' : (index === 1 ? 'bg-2' : 'bg-3');
        const targetEl = document.getElementById(bgId);
        if (targetEl) {
          targetEl.style.setProperty('background-image', `url('${src}')`, 'important');
        }

        loadedImages++;
        if (loadedImages === finalImages.length) {
          enablePlay();
        }
      };
      img.src = src;
    });

    // 监听窗口大小改变，动态切换背景图片 (实现拉伸浏览器时横竖屏图片实时切换)
    window.addEventListener('resize', () => {
      const currentIsMobile = window.innerWidth <= 768;
      // 只有当设备类型发生跨界变化（PC <-> 手机）时才重新加载和替换图片
      if (currentIsMobile !== isMobile) {
        isMobile = currentIsMobile;
        finalImages = isMobile ? mobileImages : pcImages;

        // 立即替换所有已加载场景的背景图
        finalImages.forEach((src, index) => {
          const bgId = index === 0 ? 'bg-1' : (index === 1 ? 'bg-2' : 'bg-3');
          const el = document.getElementById(bgId);
          if (el) {
            el.style.setProperty('background-image', `url('${src}')`, 'important');
          }
        });
      }
    });

    // 移除之前的 3 秒超时保险，强制等待所有图片下载完毕
    // 如果网络极差，页面会一直停留在“正在加载奇迹...”状态

    // 用户点击屏幕后正式开始播放
    startBtn.onclick = () => {
      // 1. 隐藏开场界面
      introScreen.style.opacity = '0';
      setTimeout(() => {
        introScreen.style.visibility = 'hidden';
      }, 1000);

      // 2. 进入电影模式 (展示上下黑边等)
      movieContainer.classList.add('playing');

      // 3. 启动播放引擎
      setTimeout(() => {
        isPlaying = true;
        startTime = performance.now();
        playLoop();
      }, 500); // 给黑屏过渡留点时间
    };
    // const progressBar = document.getElementById('progress-bar');
    // const timeCurrent = document.getElementById('time-current');

    // 获取所有场景元素
    const scenes = document.querySelectorAll('.scene');

    // 场景时间轴定义 (单位: 毫秒)
    // 增加了一个 delay 属性，用于控制前一个场景淡出后，黑屏停留的时间，再进入下一个场景
    const timeline = [
      { id: 'scene-1', duration: 5000, delay: 0 },  // 场景1持续5秒
      { id: 'scene-2', duration: 8000, delay: 1000 },  // 场景2持续8秒，中间黑屏过渡1秒
      { id: 'scene-3', duration: 7000, delay: 1000 }   // 场景3持续7秒，中间黑屏过渡1秒
    ];

    let totalDuration = timeline.reduce((sum, scene) => sum + scene.duration + scene.delay, 0);
    let startTime = 0;
    let isPlaying = false;
    let currentSceneIndex = -1;

    // 格式化时间 mm:ss
    function formatTime(ms) {
      let totalSeconds = Math.floor(ms / 1000);
      let m = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
      let s = (totalSeconds % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    // 移除对已删除 DOM 元素的调用
    // document.getElementById('time-total').innerText = formatTime(totalDuration);


    startBtn.onclick = () => {
      // 1. 隐藏开场界面
      introScreen.style.opacity = '0';
      setTimeout(() => { introScreen.style.display = 'none'; }, 1500);

      // 2. 进入电影模式
      movieContainer.classList.add('playing');

      // 3. 启动播放引擎
      setTimeout(() => {
        isPlaying = true;
        startTime = performance.now();
        playLoop();
      }, 1000); // 稍微延迟，等黑边动画
    };

    function playLoop() {
      if (!isPlaying) return;

      let currentTime = performance.now() - startTime;

      // 移除进度条的更新逻辑，因为 HTML 中已经被删除了
      // let progress = Math.min((currentTime / totalDuration) * 100, 100);
      // progressBar.style.width = progress + '%';
      // timeCurrent.innerText = formatTime(Math.min(currentTime, totalDuration));

      // 结束判断
      if (currentTime >= totalDuration) {
        isPlaying = false;
        // 播放结束后显示重播按钮
        document.getElementById('replay-btn').style.display = 'block';
        return;
      }

      // 计算当前应该处于哪个场景
      let accumulatedTime = 0;
      let targetSceneIndex = -1;
      let isInDelay = false; // 是否处于黑屏过渡期

      for (let i = 0; i < timeline.length; i++) {
        let sceneStart = accumulatedTime + timeline[i].delay;
        let sceneEnd = sceneStart + timeline[i].duration;

        if (currentTime >= accumulatedTime && currentTime < sceneStart) {
          // 当前时间处于 delay (黑屏过渡) 阶段
          isInDelay = true;
          targetSceneIndex = -1; // -1 表示所有场景都熄灭（黑屏）
          break;
        } else if (currentTime >= sceneStart && currentTime < sceneEnd) {
          // 当前时间处于场景播放阶段
          targetSceneIndex = i;
          break;
        }
        accumulatedTime = sceneEnd;
      }

      // 切换场景 (状态发生变化时才执行)
      if (targetSceneIndex !== currentSceneIndex) {
        // 先将所有场景熄灭
        scenes.forEach(scene => scene.classList.remove('active'));

        // 如果不是黑屏期，点亮目标场景
        if (targetSceneIndex !== -1) {
          let currentSceneId = timeline[targetSceneIndex].id;
          document.getElementById(currentSceneId).classList.add('active');
        }

        currentSceneIndex = targetSceneIndex;
      }

      requestAnimationFrame(playLoop);
    }

    // --- 重播功能 ---
    function replayMovie() {
      // 隐藏重播按钮
      document.getElementById('replay-btn').style.display = 'none';

      // 关闭可能打开的礼物盒
      const giftBox = document.getElementById('gift-box');
      if (giftBox.classList.contains('open')) {
        closeGift();
      }

      // 熄灭所有场景，并强制移除它们的类以便重新触发动画
      scenes.forEach(scene => {
        scene.classList.remove('active');
        // 这是一个小技巧：通过短暂隐藏元素来强制浏览器重置 CSS 动画
        scene.style.display = 'none';
        scene.offsetHeight; // 触发回流
        scene.style.display = '';
      });

      // 重置时间轴和播放状态
      currentSceneIndex = -1;
      isPlaying = true;
      startTime = performance.now();

      // 重新启动播放引擎
      playLoop();
    }

    // --- 粒子系统：日漫经典樱花花瓣 ---
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let particles = [];

    function resizeCanvas() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // 樱花花瓣类
    class SakuraParticle {
      constructor() {
        this.reset();
        // 初始时让花瓣散布在整个屏幕，而不是全从顶部掉落
        this.y = Math.random() * height;
      }

      reset() {
        this.x = Math.random() * width;
        this.y = -20; // 从顶部外开始
        // 樱花大小不一
        this.size = Math.random() * 8 + 4;

        // 樱花飘落的速度更慢、更轻柔
        this.speedY = Math.random() * 1.5 + 0.5;
        // 横向飘动的幅度
        this.speedX = Math.random() * 2 - 1;

        // 樱花的颜色：不同深浅的粉色
        const pinks = ['#ffb7c5', '#ffc0cb', '#ffd1dc', '#fff0f5'];
        this.color = pinks[Math.floor(Math.random() * pinks.length)];

        // 旋转角度和旋转速度
        this.angle = Math.random() * 360;
        this.spin = (Math.random() - 0.5) * 0.1;

        // 透明度
        this.opacity = Math.random() * 0.5 + 0.3;
      }

      update() {
        this.y += this.speedY;
        // 模拟风吹的左右摇摆
        this.x += this.speedX + Math.sin(this.y * 0.01) * 1;
        this.angle += this.spin;

        // 飘出屏幕底部后重生
        if (this.y > height + 20 || this.x < -20 || this.x > width + 20) {
          this.reset();
        }
      }

      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);

        ctx.globalAlpha = this.opacity;
        ctx.fillStyle = this.color;

        // 绘制樱花花瓣的形状
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.bezierCurveTo(-this.size / 2, -this.size / 2, -this.size, this.size / 3, 0, this.size);
        ctx.bezierCurveTo(this.size, this.size / 3, this.size / 2, -this.size / 2, 0, 0);
        ctx.fill();

        ctx.restore();
      }
    }

    // 创建樱花粒子
    for (let i = 0; i < 50; i++) {
      particles.push(new SakuraParticle());
    }

    function renderParticles() {
      ctx.clearRect(0, 0, width, height);
      // 只有在播放时才绘制粒子，增加氛围
      if (movieContainer.classList.contains('playing')) {
        particles.forEach(p => { p.update(); p.draw(); });
      }
      requestAnimationFrame(renderParticles);
    }
    renderParticles();

    // --- 交互式礼物盒逻辑 ---
    function openGift() {
      const giftBox = document.getElementById('gift-box');
      const finalTitle = document.getElementById('final-title');
      if (!giftBox.classList.contains('open')) {
        giftBox.classList.add('open');
        finalTitle.classList.add('hide-title'); // 隐藏下方大字，让视线聚焦在卡片上

        // 触发烟花效果
        createFireworks();
      }
    }

    function closeGift() {
      const giftBox = document.getElementById('gift-box');
      const finalTitle = document.getElementById('final-title');
      giftBox.classList.remove('open');
      finalTitle.classList.remove('hide-title'); // 恢复大字
    }

    // --- 烟花系统 ---
    const fwCanvas = document.getElementById('fireworks-canvas');
    const fwCtx = fwCanvas.getContext('2d');
    let fwWidth, fwHeight;
    let fireworks = [];
    let fwParticles = [];

    function resizeFwCanvas() {
      fwWidth = fwCanvas.width = window.innerWidth;
      fwHeight = fwCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeFwCanvas);
    resizeFwCanvas();

    class FireworkParticle {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 5 + 2; // 爆炸速度
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.life = 1.0;
        this.decay = Math.random() * 0.02 + 0.015; // 消失速度
        this.gravity = 0.05; // 简单的重力下坠
      }
      update() {
        this.x += this.vx;
        this.vy += this.gravity;
        this.y += this.vy;
        this.life -= this.decay;
      }
      draw() {
        fwCtx.globalAlpha = this.life;
        fwCtx.fillStyle = this.color;
        fwCtx.beginPath();
        fwCtx.arc(this.x, this.y, 2, 0, Math.PI * 2);
        fwCtx.fill();
      }
    }

    // 随机鲜艳的烟花颜色
    const fwColors = ['#ff0044', '#00ff88', '#00ccff', '#ffcc00', '#ff00ff', '#ffffff'];

    function createFireworks() {
      // 在屏幕上半部分随机生成 5-8 朵烟花
      const count = Math.floor(Math.random() * 4) + 5;

      // 记录这次点击总共要产生的粒子数
      let totalExpectedParticles = 0;

      for (let i = 0; i < count; i++) {
        // 错开一点时间爆炸
        setTimeout(() => {
          const x = Math.random() * fwWidth * 0.8 + fwWidth * 0.1; // 避开太靠边
          const y = Math.random() * fwHeight * 0.4 + fwHeight * 0.1; // 集中在上半部
          const color = fwColors[Math.floor(Math.random() * fwColors.length)];

          // 每朵烟花产生 50-80 个粒子
          const pCount = Math.floor(Math.random() * 30) + 50;
          for (let j = 0; j < pCount; j++) {
            fwParticles.push(new FireworkParticle(x, y, color));
          }

          // 关键修复：确保即使是在 setTimeout 里添加粒子，也能正确唤醒动画循环
          if (!isFwAnimating) {
            isFwAnimating = true;
            animateFireworks();
          }
        }, i * 300); // 每朵间隔 300ms
      }
    }

    let isFwAnimating = false;
    function animateFireworks() {
      fwCtx.globalCompositeOperation = 'destination-out';
      fwCtx.fillStyle = 'rgba(0,0,0,0.5)';
      fwCtx.fillRect(0, 0, fwWidth, fwHeight);
      fwCtx.globalCompositeOperation = 'lighter'; // 混合模式让重叠处更亮

      for (let i = fwParticles.length - 1; i >= 0; i--) {
        const p = fwParticles[i];
        p.update();
        p.draw();
        if (p.life <= 0) {
          fwParticles.splice(i, 1);
        }
      }

      fwCtx.globalAlpha = 1; // 恢复透明度

      if (fwParticles.length > 0) {
        requestAnimationFrame(animateFireworks);
      } else {
        isFwAnimating = false;
        fwCtx.clearRect(0, 0, fwWidth, fwHeight); // 确保清空
      }
    }
  </script>
